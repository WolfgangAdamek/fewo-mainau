<!DOCTYPE html>
<html>
<meta name="viewport" content="width=device-width, initial-scale=1">
<head>
 <link rel="stylesheet" href="css/style.min.css">
 <link rel="stylesheet" href="css/styles-merged.css">
    
	<script src="js/prettyPhoto/js/jquery-1.6.4.min.js"></script>
	<script>
	var $j = jQuery.noConflict();
	</script>
 </head>
<style>
body {
  font-family: Verdana, sans-serif;
  margin: 0;
}

* {
  box-sizing: border-box;
}

.row > .column {
  padding: 0 8px;
}

.row:after {
  content: "";
  display: table;
  clear: both;
}

.column {
  float: left;
  width: 25%;
   
}


/* Modal Content */
.modalx-content {
  position: relative;
  background-color: #0000050;
  margin: auto;
  padding: 0;
  width: 90%;
  max-width: 800px;
}

/* The Close Button */
.close {
  color: white;
  position: absolute;
  top: 10px;
  right: 25px;
  font-size: 35px;
  font-weight: bold;
}

.close:hover,
.close:focus {
  color: #999;
  text-decoration: none;
  cursor: pointer;
}

.mySlides {
  display: none;
}

.cursor {
  cursor: pointer;
}

/* Next & previous buttons */
.prev,
.next {
  cursor: pointer;
  position: absolute;
  top: 50%;
  width: auto;
  padding: 16px;
  margin-top: -50px;
  color: white;
  font-weight: bold;
  font-size: 20px;
  transition: 0.6s ease;
  border-radius: 0 3px 3px 0;
  user-select: none;
  -webkit-user-select: none;
}

/* Position the "next button" to the right */
.next {
  right: 0;
  border-radius: 3px 0 0 3px;
}

/* On hover, add a black background color with a little bit see-through */
.prev:hover,
.next:hover {
  background-color: rgba(0, 0, 0, 0.8);
}

/* Number text (1/3 etc) */
.numbertext {
  color: #f2f2f2;
  font-size: 12px;
  padding: 8px 12px;
  position: absolute;
  top: 0;
}

img {
  margin-bottom: -4px;
}

.caption-container {
  text-align: center;
  background-color: black;
  padding: 2px 16px;
  color: white;
  display:none;
}

.demo {
  opacity: 0.6;
  width:10%;
  float:left
}

.active,
.demo:hover {
  opacity: 1;
}

img.hover-shadow {
  transition: 0.3s;
}

.hover-shadow:hover {
  box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
}

.image-container {
  display: flex; /* This will arrange your images in a row */
  justify-content: center; /* This centers the images horizontally within the container */
  align-items: center; /* This centers the images vertically, if your container has a specific height */
  padding-top: 5px !important
}

.image-container img {
  margin: 0 5px; /* Adds some space between the images. Adjust as needed. */
  -webkit-transition:.3s all;
  transition:.3s all;
}
</style>
<body>



<div class="row">
  <div class="column">
    <img src="img/erwartung.jpg" style="width:100%" onclick="openModalx();currentSlide(1)" class="hover-shadow cursor">
  </div>
 
</div>

<div id="myModal" class="modalx">
  <span class="close cursor" onclick="closeModalx()">&times;</span>
  <div class="modalx-content">

    <div class="mySlides">
      <div class="numbertext">1 / 4</div>
      <img src="img/volkach/marktplatz-2.jpg" style="width:100%">
    </div>

    <div class="mySlides">
      <div class="numbertext">2 / 4</div>
      <img src="img/volkach/brunnenschoppen.jpg" style="width:100%">
    </div>

    <div class="mySlides">
      <div class="numbertext">3 / 4</div>
      <img src="img/volkach/hauptstrasse.jpg" style="width:100%">
    </div>
    
    <div class="mySlides">
      <div class="numbertext">4 / 4</div>
      <img src="img/volkach/abendschoppen.jpg" style="width:100%">
    </div>
    
    <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
    <a class="next" onclick="plusSlides(1)">&#10095;</a>

    <div class="caption-container">
      <p id="caption"></p>
    </div>

<div class="image-container">
    
      <img class="demo cursor" src="img/volkach/marktplatz-2.jpg" onclick="currentSlide(1)" alt="Nature and sunrise">
   
      <img class="demo cursor" src="img/volkach/brunnenschoppen.jpg" onclick="currentSlide(2)" alt="Snow">
    
      <img class="demo cursor" src="img/volkach/hauptstrasse.jpg" onclick="currentSlide(3)" alt="Mountains and fjords">
    
      <img class="demo cursor" src="img/volkach/abendschoppen.jpg" onclick="currentSlide(4)" alt="Northern Lights">
    
  </div></div>
</div>


   <script src="js/scripts.min.js"></script>
    <script src="js/custom.min.js"></script>
	<script src="js/custom.js"></script>  
</body>
</html>
