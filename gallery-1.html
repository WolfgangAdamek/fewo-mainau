<script>
// When the user clicks on any button with class openBtn, open the corresponding modal
document.querySelectorAll('.openBtn').forEach(item => {
  item.addEventListener('click', function() {
    var modal = document.getElementById(this.getAttribute('data-target'));
    if(modal) {
      modal.style.display = "block";
    }
  })
})

// When the user clicks on <span> (x), close the modal
document.querySelectorAll('.close').forEach(item => {
  item.addEventListener('click', function() {
    var modal = this.closest('.modal');
    if(modal) {
      modal.style.display = "none";
    }
  })
})

document.addEventListener('click', function(event) {
  // Check if the clicked element is not a modal button
  if (!event.target.classList.contains('openBtn')) {
    // Check if the clicked element is outside the modal content
    let withinModalContent = event.target.closest('.modal-content');
    let modalIsOpen = document.querySelector('.modal[style*="display: block"]');

    if (!withinModalContent && modalIsOpen) {
      modalIsOpen.style.display = 'none';
    }
  }
});

</script>
