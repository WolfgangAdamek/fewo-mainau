<script>
  // Function to toggle example text visibility
  function toggleExampleText(event) {
    // Prevent the default behavior of the link (opening a new URL)
    event.preventDefault();

    var exampleText = document.getElementById('example-text');
    exampleText.style.display = exampleText.style.display === 'none' ? 'block' : 'none';

    // Redirect to another URL only if the specific link is clicked
    if (event.target.getAttribute('href') === 'https://www.example.com') {
      window.location.href = event.target.getAttribute('href');
    }
  }
</script>



<script>
  // Function to toggle data text visibility
  function toggleDataText() {
    var dataText = document.getElementById('data-text');
    dataText.style.display = dataText.style.display === 'none' ? 'block' : 'none';
  }

  // Function to load data text
  function loadDataText() {
    // Fetch the text file
    fetch('datatext.txt')
      .then(response => response.text())
      .then(text => {
        // Inject the fetched text into the page
        document.getElementById('data-container').textContent = text;
      })
      .catch(error => console.error('Error loading data text:', error));
  }

  // Close data text when clicking anywhere outside of it
  document.addEventListener('click', function(event) {
    var dataText = document.getElementById('data-text');
    var targetElement = event.target; // Element that triggered the event

    // Check if the click occurred outside of the data text container
    if (!dataText.contains(targetElement) && targetElement.getAttribute('onclick') !== 'toggleDataText()') {
      dataText.style.display = 'none';
    }
  });
</script>
